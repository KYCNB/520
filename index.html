<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
}

/* 背景 */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(4px) brightness(0.5);
  transform:scale(1.08);
  transition:1.5s ease;
}

/* 渐变 */
.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.95));
}

/* 文字 */
.text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:rgba(255,255,255,.9);
  font-size:46px;
  letter-spacing:4px;
  line-height:1.9;
  text-align:center;
  max-width:78%;
  text-shadow:0 15px 50px #000;
  opacity:0;
  transition:opacity 2.5s ease;
}

/* 呼吸 */
@keyframes breathe{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.025);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

/* 轻微抖动 */
@keyframes shake{
  0%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% + .5px),calc(-50% - .5px))}
  50%{transform:translate(calc(-50% - .5px),calc(-50% + .5px))}
  75%{transform:translate(calc(-50% + .3px),calc(-50% + .3px))}
  100%{transform:translate(-50%,-50%)}
}

.text.show{
  opacity:1;
  animation:
    breathe 14s ease-in-out infinite,
    shake 6s infinite;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>
<div class="text" id="text"></div>

<script>

// 文案
const TEXT=[
"你认真过，我差点当真。",
"后来连失望都懒得说了。",
"你没变，只是不爱我了。",
"我以为是例外，其实只是替代。",
"你没回头",
"我还在等",
"热情耗尽了",
"不再打扰了",
"我信过你",
"只是你忘了"
];

// 图库
let IMAGES=[];

// 加载
async function load(){
  let res=await fetch("images.json");
  let data=await res.json();
  IMAGES=data.images;
  next();
}

// 切换
function next(){
  if(IMAGES.length===0) return;

  let i=Math.floor(Math.random()*IMAGES.length);

  document.getElementById("bg").style.backgroundImage =
    `url(${IMAGES[i].url}?q=50)`;

  let el=document.getElementById("text");

  // 30%概率空白
  let showText = Math.random() > 0.3;

  el.classList.remove("show");

  setTimeout(()=>{
    el.innerText = showText
      ? TEXT[Math.floor(Math.random()*TEXT.length)]
      : "";
    if(showText){
      el.classList.add("show");
    }
  },400);
}

// 更慢节奏（像时间流动）
setInterval(next,10000);

// 点击
document.body.addEventListener("click",next);

// 初始化
load();

</script>
</body>
</html>
