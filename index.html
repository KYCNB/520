<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日遗憾</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-size: cover;
      background-position: center;
      transition: background-image 1s ease-in-out;
    }

    .overlay {
      background: rgba(0,0,0,0.4);
      padding: 30px;
      border-radius: 16px;
      max-width: 80%;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .text {
      font-size: 24px;
      line-height: 1.6;
    }

    .date {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="text" id="text">加载中...</div>
    <div class="date" id="date"></div>
  </div>

<script>
// 伤感文案API（你可以替换成自己的）
const TEXT_API = "https://v1.hitokoto.cn/?c=d&encode=text";

// 随机图片API（每日不同）
const IMAGE_API = "https://source.unsplash.com/1600x900/?lonely,sad";

async function loadContent() {
  try {
    // 获取文案
    const textRes = await fetch(TEXT_API);
    const text = await textRes.text();
    document.getElementById("text").innerText = text;

    // 设置背景图（带时间戳避免缓存）
    const today = new Date().toISOString().slice(0,10);
    document.body.style.backgroundImage = `url(${IMAGE_API}&sig=${today})`;

    // 显示日期
    const date = new Date().toLocaleDateString();
    document.getElementById("date").innerText = date;

  } catch (e) {
    document.getElementById("text").innerText = "今天的遗憾加载失败了...";
  }
}

loadContent();
</script>
</body>
</html>
