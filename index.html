<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日遗憾</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-size: cover;
      background-position: center;
      transition: background-image 1s ease-in-out;
    }

    .overlay {
      background: rgba(0,0,0,0.4);
      padding: 30px;
      border-radius: 16px;
      max-width: 80%;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .text {
      font-size: 24px;
      line-height: 1.6;
    }

    .date {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="text" id="text">加载中...</div>
    <div class="date" id="date"></div>
  </div>

<script>
// 自定义伤感失恋文案库（更贴近“遗憾、放下”）
const TEXT_LIST = [
  "后来我终于不再打扰你了，你也真的不再需要我了。",
  "我们最后的默契，就是谁也没有再联系谁。",
  "你只陪了我一段路，我却差点以为是余生。",
  "后来我才明白，遗憾才是人生的常态。",
  "我删了你所有的联系方式，却删不掉那些习惯。",
  "那段日子挺过来了，可你再也回不来了。",
  "我们没有在一起，但我好像失去了你很多次。",
  "你是我藏在心底的名字，也是我不敢再提的人。",
  "如果当时再勇敢一点，结局会不会不一样。",
  "我没说再见，是因为再见真的很难。",
  "其实我早就知道结局，只是舍不得退出。",
  "我们都没有错，只是刚好错过了。",
  "后来我变得很冷静，也不再期待谁会坚定选择我。",
  "你回头看过我吗，哪怕一眼也好。",
  "我已经很久没哭了，只是偶尔会突然难过。",
  "原来放下一个人，是连他的消息都不想再听到。",
  "我还在原地，而你早就走远了。",
  "不是不想爱了，是再也不敢那样去爱了。",
  "有些人光是遇见，就已经花光了所有运气。",
  "你教会我怎么爱人，却没陪我到最后。"
];

// 随机图片API（每日不同）
const IMAGE_API = "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&h=900&q=80";

async function loadContent() {
  try {
    // 根据日期固定每日一句（每天不同，但不会乱跳）
    const today = new Date().toISOString().slice(0,10);
    let hash = 0;
    for (let i = 0; i < today.length; i++) {
      hash = today.charCodeAt(i) + ((hash << 5) - hash);
    }
    const index = Math.abs(hash) % TEXT_LIST.length;
    const text = TEXT_LIST[index];
    document.getElementById("text").innerText = text;

    // 设置背景图（带时间戳避免缓存）
    const today = new Date().toISOString().slice(0,10);
    // 使用时间戳避免缓存，确保每天刷新
    document.body.style.backgroundImage = `url(${IMAGE_API}&t=${today})`;

    // 显示日期
    const date = new Date().toLocaleDateString();
    document.getElementById("date").innerText = date;

  } catch (e) {
    document.getElementById("text").innerText = "今天的遗憾加载失败了...";
  }
}

loadContent();
</script>
</body>
</html>
