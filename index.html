<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
}

/* 背景 */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(4px) brightness(0.5);
  transform:scale(1.08);
  transition:1.5s ease;
}

/* 渐变 */
.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.95));
}

/* 文字 */
.text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:rgba(255,255,255,.9);
  font-size:46px;
  letter-spacing:4px;
  line-height:1.9;
  text-align:center;
  max-width:78%;
  text-shadow:0 15px 50px #000;
  opacity:0;
  transition:opacity 2.5s ease;
}

/* 呼吸 */
@keyframes breathe{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.025);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

/* 轻微抖动 */
@keyframes shake{
  0%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% + .5px),calc(-50% - .5px))}
  50%{transform:translate(calc(-50% - .5px),calc(-50% + .5px))}
  75%{transform:translate(calc(-50% + .3px),calc(-50% + .3px))}
  100%{transform:translate(-50%,-50%)}
}

.text.show{
  opacity:1;
  animation:
    breathe 14s ease-in-out infinite,
    shake 6s infinite;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>
<div class="text" id="text"></div>

<script>

// ===== 首句暴击 =====
const FIRST = [
"你不是没被爱过，是那次以后你再也不敢相信了。",
"你后来遇到的每个人，都比我更像当初的我。",
"你走之后，我才发现原来一直在原地的人只有我。",
"你不是离开了我，是从来就没打算留下来。"
];

// ===== 扎心长句 =====
const TEXT = [
"我后来才明白，你不是不爱了，你只是从一开始就没有打算认真对我负责，只是我把你的随便当成了例外。",
"你走的时候什么都没带走，偏偏把我最好的那段时间留在了原地，让我怎么走都走不出去。",
"我一直以为我们只是差一点点就能走到最后，后来才发现，那一点点，其实是你从来没想过要跨过来。",
"你说过会一直在，可最后连一句像样的告别都没有，就好像我在你那里，从头到尾都不值得认真结束。",
"最难受的不是你离开，而是你明明还在我的生活里出现，却已经不再属于我了。",
"我反复确认过很多次，是不是我哪里做错了，后来才发现，其实只是你不够喜欢我而已。",
"你让我觉得自己很特别，后来才知道，你对谁都可以这样，只是我当时太认真了。",
"我删掉了你所有的联系方式，可还是会在某一刻突然想起你，然后发现自己其实一点都没有放下。",
"你说过的话我都记得，可是你后来一句一句地否认，好像那些认真过的人只有我一个。",
"我们不是没有未来，是你在还没开始的时候，就已经决定要离开了，只是我一直不知道。",
"你从来没有说过要走，可你做的每一件事，都在一点一点把我推远。",
"最讽刺的是，我连难过都要控制分寸，因为我知道，你早就不在意了。",
"我以为我是在等你，后来才发现，我只是舍不得承认这段关系早就结束了。",
"你教会我怎么去爱一个人，却没有教我，最后该怎么把你忘掉。",
"如果当初你能再坚定一点，或者我能再清醒一点，我们都不会变成现在这样。"
];

// ===== 图库 =====
let IMAGES=[];

// ===== 首次标记 =====
let first = true;

// 加载图库
async function load(){
  let res=await fetch("images.json");
  let data=await res.json();
  IMAGES=data.images;
  next();
}

// 切换
function next(){
  if(IMAGES.length===0) return;

  let i=Math.floor(Math.random()*IMAGES.length);

  document.getElementById("bg").style.backgroundImage =
    `url(${IMAGES[i].url}?q=50)`;

  let el=document.getElementById("text");

  // 首次必显示，之后20%留白
  let showText = first ? true : Math.random() > 0.2;

  el.classList.remove("show");

  setTimeout(()=>{
    if(showText){
      el.innerText = first
        ? FIRST[Math.floor(Math.random()*FIRST.length)]
        : TEXT[Math.floor(Math.random()*TEXT.length)];

      el.classList.add("show");
    }else{
      el.innerText = "";
    }

    first = false;

  },400);
}

// 自动节奏（慢）
setInterval(next,10000);

// 点击切换
document.body.addEventListener("click",next);

// 初始化
load();

</script>

</body>
</html>
